openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Vera Nexus BI Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Line page - causal events timeline
  - name: reports
    description: Sight page - intelligence reports
  - name: companies
    description: Crypt page - corporate failures
  - name: signals
    description: Market signals
  - name: thoughts
    description: Thoughts Hub social feed
  - name: reactions
    description: Thought reactions
  - name: ai
    description: Venus AI intelligence engine
  - name: settings
    description: User settings including Groq API key
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── EVENTS (Line page) ──
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List causal events chronologically
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [all, technology, finance, markets, health]
        - name: sentiment
          in: query
          schema:
            type: string
            enum: [all, positive, negative, mixed]
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}/ripple:
    post:
      operationId: rippleAnalysis
      tags: [events]
      summary: AI ripple analysis for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ripple analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RippleResult"

  # ── REPORTS (Sight page) ──
  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List intelligence reports
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [all, technology, finance, markets, health]
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a single intelligence report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /reports/{id}/summary:
    post:
      operationId: reportSummary
      tags: [reports]
      summary: AI summary for a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResult"

  # ── COMPANIES (Crypt page) ──
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies in the corporate graveyard
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [all, technology, finance, markets, health]
        - name: sort
          in: query
          schema:
            type: string
            enum: [date, name, impact]
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a single company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}/autopsy:
    post:
      operationId: companyAutopsy
      tags: [companies]
      summary: AI autopsy analysis for a failed company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Autopsy analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutopsyResult"

  /companies/{id}/autopsy/chat:
    post:
      operationId: autopsyChat
      tags: [companies]
      summary: Interim CEO simulation chat — try to save the company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutopsyChatInput"
      responses:
        "200":
          description: CEO simulation response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutopsyChatResult"

  # ── SIGNALS ──
  /signals:
    get:
      operationId: getSignals
      tags: [signals]
      summary: Get market signals
      responses:
        "200":
          description: Market signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  # ── THOUGHTS HUB ──
  /thoughts:
    get:
      operationId: listThoughts
      tags: [thoughts]
      summary: List thoughts
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [all, technology, finance, markets, health]
      responses:
        "200":
          description: List of thoughts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Thought"

    post:
      operationId: createThought
      tags: [thoughts]
      summary: Post a new thought
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThoughtInput"
      responses:
        "201":
          description: Created thought
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thought"

  /thoughts/{id}:
    get:
      operationId: getThought
      tags: [thoughts]
      summary: Get a single thought
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Thought
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thought"

    delete:
      operationId: deleteThought
      tags: [thoughts]
      summary: Delete a thought
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── REACTIONS ──
  /reactions:
    post:
      operationId: toggleReaction
      tags: [reactions]
      summary: Toggle a reaction on a thought
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Reaction toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactionResult"

  # ── VENUS AI ──
  /ai/analyze:
    post:
      operationId: venusAnalyze
      tags: [ai]
      summary: Venus AI business intelligence analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: Venus AI JSON card response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenusResponse"

  /ai/idea-review:
    post:
      operationId: ideaReview
      tags: [ai]
      summary: Idea reviewer - evaluate a business idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaReviewInput"
      responses:
        "200":
          description: Idea review result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenusResponse"

  # ── SETTINGS ──
  /settings/groq-key:
    get:
      operationId: getGroqKeyStatus
      tags: [settings]
      summary: Check if Groq API key is configured
      responses:
        "200":
          description: Key status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroqKeyStatus"

    post:
      operationId: saveGroqKey
      tags: [settings]
      summary: Save Groq API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroqKeyInput"
      responses:
        "200":
          description: Key saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroqKeyStatus"

    delete:
      operationId: deleteGroqKey
      tags: [settings]
      summary: Remove Groq API key
      responses:
        "200":
          description: Key removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroqKeyStatus"

  /settings/onboarding:
    get:
      operationId: getOnboarding
      tags: [settings]
      summary: Get onboarding/business context
      responses:
        "200":
          description: Onboarding data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingData"

    post:
      operationId: saveOnboarding
      tags: [settings]
      summary: Save onboarding/business context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── EVENT ──
    Event:
      type: object
      required: [id, year, title, category, sentiment, impact, source]
      properties:
        id:
          type: integer
        year:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          enum: [technology, finance, markets, health]
        sentiment:
          type: string
          enum: [positive, negative, mixed]
        impact:
          type: integer
          description: Impact score 0-100
        source:
          type: string
        rippleCount:
          type: integer
        tags:
          type: array
          items:
            type: string

    RippleResult:
      type: object
      required: [eventId, analysis]
      properties:
        eventId:
          type: integer
        analysis:
          type: string
        causalChain:
          type: array
          items:
            type: string
        affectedSectors:
          type: array
          items:
            type: string
        flowchart:
          type: object
          properties:
            nodes:
              type: array
              items:
                type: object
                required: [id, label, type]
                properties:
                  id:
                    type: string
                  label:
                    type: string
                  type:
                    type: string
                    enum: [trigger, cause, effect, consequence]
            edges:
              type: array
              items:
                type: object
                required: [from, to]
                properties:
                  from:
                    type: string
                  to:
                    type: string

    # ── REPORT ──
    Report:
      type: object
      required: [id, title, source, publishedAt, category, summary]
      properties:
        id:
          type: integer
        title:
          type: string
        source:
          type: string
        publishedAt:
          type: string
        category:
          type: string
          enum: [technology, finance, markets, health]
        summary:
          type: string
        imageUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string

    SummaryResult:
      type: object
      required: [reportId, summary, keyTakeaways]
      properties:
        reportId:
          type: integer
        summary:
          type: string
        keyTakeaways:
          type: array
          items:
            type: string
        causalImplications:
          type: string

    # ── COMPANY ──
    Company:
      type: object
      required: [id, name, yearRange, description, category]
      properties:
        id:
          type: integer
        name:
          type: string
        yearRange:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [technology, finance, markets, health]
        tags:
          type: array
          items:
            type: string
        failureReason:
          type: ["string", "null"]

    AutopsyResult:
      type: object
      required: [companyId, rootCause, timeline, lessonsLearned]
      properties:
        companyId:
          type: integer
        rootCause:
          type: string
        timeline:
          type: string
        lessonsLearned:
          type: array
          items:
            type: string
        causalChain:
          type: array
          items:
            type: string
        analogy:
          type: ["string", "null"]

    AutopsyChatInput:
      type: object
      required: [message, attempt]
      properties:
        message:
          type: string
          minLength: 1
        attempt:
          type: integer
          minimum: 0
          maximum: 5
        history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string

    AutopsyChatResult:
      type: object
      required: [reply, companyState, attempt, gameOver]
      properties:
        reply:
          type: string
        companyState:
          type: string
        attempt:
          type: integer
        gameOver:
          type: boolean
        outcome:
          type: ["string", "null"]

    # ── SIGNAL ──
    Signal:
      type: object
      required: [id, name, value, change, sentiment]
      properties:
        id:
          type: integer
        name:
          type: string
        value:
          type: ["string", "null"]
        change:
          type: string
        sentiment:
          type: string
          enum: [positive, negative, warning, neutral]

    # ── THOUGHT ──
    Thought:
      type: object
      required: [id, content, author, category, createdAt]
      properties:
        id:
          type: integer
        content:
          type: string
        author:
          type: string
        category:
          type: string
          enum: [technology, finance, markets, health]
        createdAt:
          type: string
        reactions:
          type: object
          additionalProperties:
            type: integer
        tags:
          type: array
          items:
            type: string

    ThoughtInput:
      type: object
      required: [content, author, category]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 500
        author:
          type: string
          minLength: 1
        category:
          type: string
          enum: [technology, finance, markets, health]
        tags:
          type: array
          items:
            type: string

    # ── REACTION ──
    ReactionInput:
      type: object
      required: [thoughtId, reactionType]
      properties:
        thoughtId:
          type: integer
        reactionType:
          type: string
          enum: [fire, brain, chart, signal, agree]

    ReactionResult:
      type: object
      required: [action, thoughtId, reactionType]
      properties:
        action:
          type: string
          enum: [added, deleted]
        thoughtId:
          type: integer
        reactionType:
          type: string

    # ── VENUS AI ──
    AnalyzeInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
        businessContext:
          type: ["string", "null"]
        sessionHistory:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string

    IdeaReviewInput:
      type: object
      required: [idea]
      properties:
        idea:
          type: string
          minLength: 1
        stage:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        teamSize:
          type: ["string", "null"]

    VenusResponse:
      type: object
      required: [summary, cards]
      properties:
        summary:
          type: string
        cards:
          type: array
          items:
            type: object
            required: [type, title, content]
            properties:
              type:
                type: string
                enum: [analysis, market, risk, roadmap, decision]
              title:
                type: string
              content:
                type: object

    # ── SETTINGS ──
    GroqKeyStatus:
      type: object
      required: [configured]
      properties:
        configured:
          type: boolean
        maskedKey:
          type: ["string", "null"]

    GroqKeyInput:
      type: object
      required: [apiKey]
      properties:
        apiKey:
          type: string
          minLength: 10

    OnboardingData:
      type: object
      properties:
        companyName:
          type: ["string", "null"]
        stage:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        teamSize:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        primaryGoal:
          type: ["string", "null"]
        completed:
          type: boolean

    OnboardingInput:
      type: object
      required: [companyName, stage, industry, teamSize, country, primaryGoal]
      properties:
        companyName:
          type: string
        stage:
          type: string
        industry:
          type: string
        teamSize:
          type: string
        country:
          type: string
        primaryGoal:
          type: string
